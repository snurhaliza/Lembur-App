<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3 id="welcome">Halo</h3>

  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('input')">Input Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

  <div id="todayDate" class="date-box"></div>

  <div class="grid">

    <div class="card">
      Hari Ini
      <h2 id="todayTotal">0 Jam</h2>
    </div>

    <div class="card">
      Bulan Ini
      <h2 id="monthTotal">0 Jam</h2>
    </div>

  </div>

  <!-- GRAFIK -->
  <div class="card">
    <h3>Top Lembur</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- INPUT -->
<div id="input" style="display:none">

  <div class="card">

    <input id="nik" readonly>
    <input id="nama" readonly>

    <input id="keterangan" placeholder="Pekerjaan">

    <select id="jenis">
      <option value="">Lembur</option>
      <option>N</option>
      <option>H</option>
    </select>

    <select id="jam">
      <option value="">K.Alasan</option>
      <option>1</option>
      <option>5</option>
      <option>8</option>
    </select>

    <input type="time" id="mulai">
    <input type="time" id="akhir">
    <input id="total" readonly placeholder="Total Jam">

    <div class="btn-group">
      <button onclick="simpan()">Submit</button>
      <button onclick="resetForm()">Reset</button>
    </div>

  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
