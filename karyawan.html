<!DOCTYPE html>
<html>
<head>
  <title>Karyawan</title>

  <!-- WAJIB -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3 id="welcome"></h3>

  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('input')">Input</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

  <div id="dash">

    <div id="todayDate" class="card"></div>

    <div class="card">
      <h3>Top 3 Karyawan</h3>
      <input type="month" id="filterBulan">
      <canvas id="chart"></canvas>
    </div>

  </div>

  <div id="input" style="display:none">

    <div class="card">

      <input id="nik" readonly>
      <input id="nama" readonly>

      <input id="keterangan" placeholder="Pekerjaan">

      <select id="jenis">
        <option value="">Lembur</option>
        <option>N</option>
        <option>H</option>
      </select>

      <select id="jam">
        <option value="">K.Alasan</option>
        <option>1</option>
        <option>5</option>
        <option>8</option>
      </select>

      <!-- WRAP AGAR RAPI DI HP -->
      <div class="row">
        <input type="time" id="mulai">
<input type="time" id="akhir">
<input type="text" id="total" readonly>
      </div>

      <input id="total" readonly placeholder="Total Jam">

      <button onclick="simpan()">Submit</button>
      <button onclick="resetForm()">Reset</button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
