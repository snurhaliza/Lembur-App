<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="logo top-left">MAINTENAX</div>
<div class="logo bottom-right">MAINTENAX</div>

<div class="sidebar">
<h3>KARYAWAN</h3>

<button onclick="menu('dash')">Dashboard</button>
<button onclick="menu('input')">Input Lembur</button>
<button onclick="menu('saya')">Saya</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

<div class="card">
💡 Motivasi
<h4>Kerja hari ini = sukses besok 💪</h4>
</div>

<div class="card">
📅 Hari Ini
<h2 id="today"></h2>
</div>

<div class="card">
📌 Status
<h3 id="status"></h3>
</div>

</div>

<!-- INPUT -->
<div id="input" style="display:none">

<div class="card">

<input type="date" id="tanggal">
<input id="nik" readonly>
<input id="nama" readonly>

<input id="keterangan" placeholder="Pekerjaan">

<select id="jenis">
<option>N</option>
<option>H</option>
</select>

<select id="jam">
<option>1</option>
<option>5</option>
<option>8</option>
</select>

<input type="time" id="mulai">
<input type="time" id="akhir">
<input id="total" readonly>

<button onclick="simpan()">Submit</button>

</div>

</div>

<!-- SAYA -->
<div id="saya" style="display:none">
<div class="card">
<h3>Akun Saya</h3>
<p id="infoUser"></p>
</div>
</div>

</div>

<script src="karyawan.js"></script>
</body>
</html>
