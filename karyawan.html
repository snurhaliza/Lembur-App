<!DOCTYPE html>
<html>
<head>
<title>Karyawan</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3 id="welcome"></h3>
  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('input')">Input Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

  <div class="card">
    Total Lembur Bulan Ini
    <h2 id="monthTotal">0 Jam</h2>
  </div>

  <div class="card">
    <h3>Top 3 Karyawan</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- INPUT -->
<div id="input" style="display:none">

  <div class="card form-card">

    <h3>Input Lembur</h3>

    <div class="form-grid">

      <div class="form-group">
        <label>NIK</label>
        <input id="nik" readonly>
      </div>

      <div class="form-group">
        <label>Nama</label>
        <input id="nama" readonly>
      </div>

      <div class="form-group full">
        <label>Pekerjaan</label>
        <input id="keterangan" placeholder="Masukkan pekerjaan">
      </div>

      <div class="form-group">
        <label>Alasan</label>
        <select id="jenis">
          <option value="">Pilih</option>
          <option>N</option>
          <option>H</option>
        </select>
      </div>

      <div class="form-group">
        <label>Kategori</label>
        <select id="jam">
          <option value="">Pilih</option>
          <option>1</option>
          <option>5</option>
          <option>8</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mulai</label>
        <input type="time" id="mulai">
      </div>

      <div class="form-group">
        <label>Akhir</label>
        <input type="time" id="akhir">
      </div>

      <div class="form-group full">
        <label>Total Jam</label>
        <input id="total" readonly>
      </div>

    </div>

    <div class="btn-group">
      <button onclick="simpan()">Submit</button>
      <button onclick="resetForm()">Reset</button>
    </div>

  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
