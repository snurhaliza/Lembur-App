<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h3>KARYAWAN</h3>
<button onclick="menu('dash')">Dashboard</button>
<button onclick="menu('input')">Input</button>
<button onclick="menu('grafik')">Grafik</button>
<button onclick="menu('akun')">Saya</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

<div class="card">
💡 Motivasi Hari Ini
<h4>Kerja keras hari ini adalah kesuksesan besok 💪</h4>
</div>

<div class="card">
📅 Hari Ini
<h2 id="today"></h2>
</div>

<div class="card">
📌 Status Lembur Hari Ini
<h3 id="status"></h3>
</div>

<div class="card">
📊 Total Bulan Ini
<h2 id="totalBulan"></h2>
</div>

</div>

<!-- INPUT -->
<div id="input" style="display:none">

<div class="card">

<input type="date" id="tanggal">
<input id="nik" readonly>
<input id="nama" readonly>

<input placeholder="Pekerjaan">

<select>
<option>N</option>
<option>H</option>
</select>

<select>
<option>1</option>
<option>5</option>
<option>8</option>
</select>

<input type="time" id="mulai">
<input type="time" id="akhir">
<input id="total" readonly>

<button onclick="simpan()">Submit</button>
<button onclick="reset()">Reset</button>

</div>

</div>

<!-- GRAFIK -->
<div id="grafik" style="display:none">

<div class="card">
<h3>Top 3 Lembur Karyawan</h3>
<canvas id="chart"></canvas>
</div>

</div>

<!-- AKUN -->
<div id="akun" style="display:none">

<div class="card">
<h3>Ganti Password</h3>
<input id="pass">
<button onclick="updatePass()">Simpan</button>
</div>

</div>

</div>

<script src="karyawan.js"></script>
</body>
</html>
