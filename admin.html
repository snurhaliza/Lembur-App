<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3>ADMIN</h3>
  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('data')">Data Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

  <div class="card">
    Notifikasi Input Hari Ini
    <h2 id="todayCount">0</h2>
  </div>

  <div class="card">
    <h3>Top 3 Lembur</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- DATA -->
<div id="data" style="display:none">
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>NIK</th>
        <th>Nama</th>
        <th>Pekerjaan</th>
        <th>Lembur</th>
        <th>K.Alasan</th>
        <th>Mulai</th>
        <th>Akhir</th>
        <th>Total</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
