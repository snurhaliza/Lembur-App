<!DOCTYPE html>
<html>
<head>
  <title>Admin - Maintenax</title>

  <!-- WAJIB -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3>MAINTENAX</h3>

  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('data')">Data Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

  <div id="dash">

    <div id="todayDate" class="card"></div>

    <div class="grid">
      <div class="card notif">
        🔔 Notifikasi Hari Ini
        <h2 id="todayCount">0</h2>
      </div>
    </div>

    <div class="card">
      <label>Filter Bulan:</label>
      <input type="month" id="filterBulan" onchange="loadGrafik()">
    </div>

    <div class="card">
      <h3>Top 3 Karyawan</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>

  <div id="data" style="display:none">

    <input type="month" id="filterBulanData">

    <!-- WRAPPER biar scroll di HP -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>NIK</th>
            <th>Nama</th>
            <th>Pekerjaan</th>
            <th>Lembur</th>
            <th>K.Alasan</th>
            <th>Mulai</th>
            <th>Akhir</th>
            <th>Total</th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody id="table"></tbody>
      </table>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
