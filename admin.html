<!DOCTYPE html>
<html>
<head>
  <title>Admin - Maintenax</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="init()">

<div class="sidebar">
  <h3>MAINTENAX</h3>

  <button onclick="menu('dash')">Dashboard</button>
  <button onclick="menu('data')">Data Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

  <!-- DASHBOARD -->
  <div id="dash">

    <!-- ✅ WELCOME ADMIN -->
    <div id="welcome" class="card"></div>

    <div id="todayDate" class="card"></div>

    <div class="grid">
      <div class="card notif">
        🔔 Notifikasi Hari Ini
        <h2 id="todayCount">0</h2>
      </div>
    </div>

    <!-- ✅ TOTAL BULAN -->
<div class="card">
  <h3>Total Lembur Bulan Ini</h3>
  <h2 id="totalBulanDash">0 Jam</h2>
</div>

<!-- ✅ REKAP HARI INI -->
<div class="card">
  <h3>Rekap Hari Ini</h3>
  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Jam</th>
      </tr>
    </thead>
    <tbody id="rekapHariIni"></tbody>
  </table>
</div>

  </div>

  <!-- DATA -->
  <div id="data" style="display:none">

   <input type="month" id="filterBulanData" onchange="loadData()">
   
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>NIK</th>
            <th>Nama</th>
            <th>Pekerjaan</th>
            <th>Lembur</th>
            <th>K.Alasan</th>
            <th>Mulai</th>
            <th>Akhir</th>
            <th>Total</th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody id="table"></tbody>
      </table>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
