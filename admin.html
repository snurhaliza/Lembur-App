<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h3>ADMIN</h3>
<button onclick="menu('dash')">Dashboard</button>
<button onclick="menu('data')">Data Lembur</button>
<button onclick="menu('grafik')">Grafik</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div id="dash">
<div class="grid">

<div class="card notif">
🔔 Hari Ini
<h2 id="todayCount">0</h2>
</div>

<div class="card">
📊 Bulan Ini
<h2 id="monthTotal">0</h2>
</div>

<div class="card warning">
⚠️ >56 Jam
<h2 id="warning">0</h2>
</div>

</div>
</div>

<div id="data" style="display:none">

<input id="search" placeholder="Cari nama..." oninput="loadData()">

<table>
<thead>
<tr>
<th>Tanggal</th><th>NIK</th><th>Nama</th>
<th>Keterangan</th><th>Tipe</th>
<th>Mulai</th><th>Akhir</th><th>Total</th><th>Aksi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<div id="grafik" style="display:none">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>
</body>
</html>
