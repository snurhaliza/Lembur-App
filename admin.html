<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h3>ADMIN PANEL</h3>
<button onclick="menu('dash')">Dashboard</button>
<button onclick="menu('data')">Data Lembur</button>
<button onclick="menu('warn')">Warning</button>
<button onclick="menu('akun')">Akun</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">

<div class="grid">

<div class="card">
🔔 Lembur Hari Ini
<h2 id="todayCount"></h2>
</div>

<div class="card">
📊 Lembur Bulan Ini
<h2 id="monthTotal"></h2>
</div>

<div class="card">
⚠️ Warning >56 Jam
<h2 id="warning"></h2>
</div>

</div>

</div>

<!-- DATA TABLE -->
<div id="data" style="display:none">

<div class="card">

<input id="search" placeholder="Cari nama">

<table>
<thead>
<tr>
<th>Tanggal</th><th>NIK</th><th>Nama</th>
<th>Jam</th><th>Keterangan</th><th>Aksi</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<!-- AKUN -->
<div id="akun" style="display:none">

<div class="card">
<h3>Ganti Password Admin</h3>
<input id="pass">
<button onclick="updatePass()">Simpan</button>
</div>

</div>

</div>

<script src="admin.js"></script>
</body>
</html>
