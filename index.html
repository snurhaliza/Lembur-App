<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-box text-center">
    <h3>⚙ MaintenaX</h3>

    <input id="loginNik" class="form-control mb-3" placeholder="Masukkan NIK">
    <button class="btn btn-primary w-100" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appPage" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h4>⚙ MaintenaX</h4>

    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('lembur')">Lembur Bulanan</button>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h5 id="welcome"></h5>

    <!-- DASHBOARD -->
    <div id="dashboard">

      <div class="row g-3">

        <div class="col-md-4">
          <div class="card stat">
            <h6>🔔 Lembur Hari Ini</h6>
            <h3 id="todayTotal">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat">
            <h6>⏱ Lembur Bulan Ini</h6>
            <h3 id="monthTotal">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card stat warning">
            <h6>⚠️ Warning >56 Jam</h6>
            <div id="warningList"></div>
          </div>
        </div>

      </div>

      <div class="card mt-3 p-3">
        <h5>🏆 Top 3 Karyawan</h5>
        <ul id="top3"></ul>
      </div>

    </div>

    <!-- LEMBUR -->
    <div id="lembur" style="display:none;">

      <h5>Lembur Bulanan</h5>

      <div class="row mb-2">
        <div class="col">
          <input type="month" id="filterBulan" class="form-control">
        </div>
        <div class="col">
          <input type="text" id="searchNama" class="form-control" placeholder="Cari nama">
        </div>
      </div>

      <div class="card p-3">
        <table class="table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nama</th>
              <th>Pekerjaan</th>
              <th>Jam</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableLembur"></tbody>
        </table>
      </div>

      <button class="btn btn-success mt-2" onclick="exportExcel()">Export Excel</button>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
