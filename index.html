<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN (POLosan) -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h3 class="text-center">MaintenaX</h3>

    <select id="role" class="form-select mb-2">
      <option value="karyawan">Karyawan</option>
      <option value="admin">Admin</option>
    </select>

    <input id="loginNik" class="form-control mb-3" placeholder="Masukkan NIK">
    <button class="btn btn-primary w-100" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appPage" style="display:none;">

<div class="sidebar">
  <h4>⚙ MaintenaX</h4>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('data')">Lembur Bulan Ini</button>
  <button onclick="showPage('all')">Semua Lembur</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="row">
  <div class="col">
    <div class="card stat">
      <h6>Lembur Hari Ini</h6>
      <h3 id="todayTotal">0</h3>
    </div>
  </div>

  <div class="col">
    <div class="card stat">
      <h6>Lembur Bulan Ini</h6>
      <h3 id="monthTotal">0</h3>
    </div>
  </div>

  <div class="col">
    <div class="card stat">
      <h6>Warning >56 Jam</h6>
      <h3 id="warningTotal">0</h3>
    </div>
  </div>
</div>

<div class="card mt-3 p-3">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- DATA BULAN -->
<div id="data" style="display:none;">

<input type="month" id="filterBulan" class="form-control mb-2">

<table class="table table-bordered">
<thead>
<tr>
<th>Nama</th>
<th>Total Jam</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button class="btn btn-success" onclick="exportExcel()">Export Excel</button>
<button class="btn btn-danger" onclick="exportPDF()">Export PDF</button>

</div>

<!-- SEMUA DATA -->
<div id="all" style="display:none;">
  <h5>Semua Lembur</h5>
  <select id="tahun" class="form-select mb-2"></select>
  <ul id="bulanList"></ul>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
