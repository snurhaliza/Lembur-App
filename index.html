<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <div class="login-box text-center">
    <h3 class="logo-dark">MaintenaX</h3>
    <input id="loginNik" class="form-control mb-2" placeholder="NIK">
    <input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">
    <button class="btn btn-primary w-100" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="page">

  <div class="sidebar">
    <h4 class="logo">⚙ MaintenaX</h4>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('input')">Input Lembur</button>
    <button onclick="showPage('grafik')">Grafik</button>
    <hr>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <h5 id="welcome" class="mb-3 text-white"></h5>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card p-4 mb-3">
      <h4 id="todayDate"></h4>
      <p class="text-muted">Semangat lembur hari ini 💪🔥</p>

      <div class="row mt-3">
        <div class="col">
          <div class="card p-3 text-center">
            <h6>Total Jam Bulan Ini</h6>
            <h3 id="totalJam">0</h3>
          </div>
        </div>
        <div class="col">
          <div class="card p-3 text-center">
            <h6>Status Hari Ini</h6>
            <h3 id="statusHari">Belum Input</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div id="input" class="card p-3" style="display:none;">
      <input type="date" id="tanggal" class="form-control mb-2">
      <input type="text" id="nama" readonly class="form-control mb-2">
      <input type="text" id="pekerjaan" class="form-control mb-2" placeholder="Pekerjaan">

      <select id="lembur" class="form-select mb-2">
        <option value="">Pilih Lembur</option>
        <option value="N">Normal</option>
        <option value="H">Hari Libur</option>
      </select>

      <select id="alasan" class="form-select mb-2">
        <option value="">Pilih Alasan</option>
        <option value="1">1 Jam</option>
        <option value="5">5 Jam</option>
        <option value="8">8 Jam</option>
      </select>

      <div class="row">
        <div class="col"><input type="time" id="mulai" class="form-control"></div>
        <div class="col"><input type="time" id="akhir" class="form-control"></div>
      </div>

      <input id="total" readonly class="form-control mt-2" placeholder="Total otomatis">

      <button class="btn btn-success w-100 mt-3" onclick="simpan()">Simpan Lembur</button>
    </div>

    <!-- GRAFIK -->
    <div id="grafik" class="card p-3" style="display:none;">
      <input type="month" id="bulanTahun" class="form-control mb-3">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
