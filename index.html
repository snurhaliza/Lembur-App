<!DOCTYPE html>
<html>
<head>
  <title>Login - Maintenax</title>

  <!-- ✅ FIX MOBILE (ANTI ZOOM & LAYOUT AMAN) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <link rel="stylesheet" href="style.css">

  <!-- ✅ FIX INPUT MOBILE BIAR GAK ZOOM -->
  <style>
    input, select, button {
      font-size: 16px;
    }
  </style>
</head>

<body class="login-page">

<div class="login-box">
  <h2>MAINTENAX</h2>

  <select id="role">
    <option value="karyawan">Karyawan</option>
    <option value="admin">Admin</option>
  </select>

  <!-- ✅ FIX -->
  <input id="password" type="text" placeholder="Masukkan NIK" autocomplete="off">

  <button onclick="login()">Login</button>

  <p id="msg" class="error"></p>
</div>

<script src="script.js"></script>

<!-- ✅ ENTER + ANTI DOUBLE CLICK BUG -->
<script>
const input = document.getElementById("password");
const btn = document.querySelector("button");

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    btn.click();
  }
});

// ✅ cegah klik spam (biar gak dobel request)
btn.addEventListener("click", function(){
  btn.disabled = true;
  setTimeout(()=> btn.disabled = false, 1000);
});
</script>

</body>
</html>
