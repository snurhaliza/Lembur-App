<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h3>⚙ MaintenaX</h3>

    <input id="nik" placeholder="NIK">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- ADMIN SIDEBAR -->
  <div id="sidebarAdmin" class="sidebar" style="display:none;">
    <h3>ADMIN</h3>
    <button onclick="show('adminDashboard')">Dashboard</button>
    <button onclick="show('adminLembur')">Data Lembur</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- USER SIDEBAR -->
  <div id="sidebarUser" class="sidebar" style="display:none;">
    <h3>KARYAWAN</h3>
    <button onclick="show('userDashboard')">Dashboard</button>
    <button onclick="show('inputLembur')">Input Lembur</button>
    <button onclick="show('akun')">Akun</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ADMIN DASHBOARD -->
    <div id="adminDashboard" class="page">
      <h3>Dashboard Admin</h3>
      <p>Hari ini: <span id="today"></span></p>
      <p>Bulan ini: <span id="month"></span></p>

      <div id="warning"></div>
    </div>

    <!-- ADMIN TABLE -->
    <div id="adminLembur" class="page" style="display:none;">
      <h3>Data Lembur</h3>
      <table>
        <tbody id="tbl"></tbody>
      </table>

      <button onclick="exportExcel()">Export</button>
    </div>

    <!-- USER DASHBOARD -->
    <div id="userDashboard" class="page" style="display:none;">
      <h3>Selamat Datang</h3>
      <p id="tanggal"></p>
    </div>

    <!-- INPUT -->
    <div id="inputLembur" class="page" style="display:none;">
      <h3>Input Lembur</h3>
      <input placeholder="Jam">
      <button>Simpan</button>
    </div>

    <!-- AKUN -->
    <div id="akun" class="page" style="display:none;">
      <h3>Akun</h3>
      <p id="namaAkun"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
