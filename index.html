<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <div class="login-box text-center">
    <h3 class="logo-dark">MaintenaX</h3>

    <select id="role" class="form-select mb-2">
      <option value="karyawan">Karyawan</option>
      <option value="admin">Admin</option>
    </select>

    <input id="loginNik" class="form-control mb-3" placeholder="Masukkan NIK">
    <button class="btn btn-primary w-100" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="page">

<div class="sidebar">
  <h4>⚙ MaintenaX</h4>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('input')">Input</button>
  <button onclick="showPage('grafik')">Grafik</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="topbar">
  <div>MaintenaX</div>
  <div id="todayTop"></div>
</div>

<div class="content">

<h5 id="welcome"></h5>

<!-- DASHBOARD -->
<div id="dashboard" class="card p-3">
  <h4 id="todayDate"></h4>
  <p>Semangat lembur hari ini 💪</p>
  <h5 id="statusHari">Belum Input</h5>
</div>

<!-- INPUT -->
<div id="input" class="card p-3" style="display:none;">
  <input type="date" id="tanggal" class="form-control mb-2">
  <input id="nama" readonly class="form-control mb-2">
  <input id="pekerjaan" class="form-control mb-2" placeholder="Pekerjaan">

  <select id="lembur" class="form-select mb-2">
    <option value="">Lembur</option>
    <option value="N">Normal</option>
    <option value="H">Libur</option>
  </select>

  <select id="alasan" class="form-select mb-2">
    <option value="">Alasan</option>
    <option value="1">1</option>
    <option value="5">5</option>
    <option value="8">8</option>
  </select>

  <input type="time" id="mulai" class="form-control mb-2">
  <input type="time" id="akhir" class="form-control mb-2">

  <input id="total" readonly class="form-control mb-2">

  <button onclick="simpan()" class="btn btn-success">Simpan</button>
</div>

<!-- GRAFIK -->
<div id="grafik" style="display:none;">
  <input type="month" id="bulanTahun" class="form-control mb-2">
  <canvas id="chart"></canvas>
</div>

</div>
</div>

<!-- POPUP -->
<div id="successPopup" class="popup">
  <div class="popup-content">
    ✔ Lembur berhasil disimpan
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
