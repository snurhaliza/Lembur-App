<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaintenaX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="box">
    <h2>MaintenaX</h2>
    <input id="nik" placeholder="NIK">
    <input id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- ADMIN SIDEBAR -->
  <div id="adminSidebar" class="sidebar" style="display:none;">
    <h3>ADMIN</h3>
    <button onclick="show('adminDash')">Dashboard</button>
    <button onclick="show('adminData')">Data Lembur</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- USER SIDEBAR -->
  <div id="userSidebar" class="sidebar" style="display:none;">
    <h3>KARYAWAN</h3>
    <button onclick="show('userDash')">Dashboard</button>
    <button onclick="show('input')">Input Lembur</button>
    <button onclick="show('akun')">Akun Saya</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ADMIN DASHBOARD -->
    <div id="adminDash" class="page">
      <h2>Dashboard Admin</h2>

      <div class="card">Hari ini: <span id="today"></span></div>
      <div class="card">Bulan ini: <span id="month"></span></div>

      <h3>⚠ Warning >56 Jam</h3>
      <div id="warning"></div>
    </div>

    <!-- ADMIN TABLE -->
    <div id="adminData" class="page">
      <h2>Data Lembur</h2>

      <input id="searchName" placeholder="Cari Nama">
      <input id="searchMonth" type="month">

      <button onclick="loadTable()">Filter</button>

      <table border="1">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>NIK</th>
            <th>Nama</th>
            <th>Total</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tbl"></tbody>
      </table>

      <button onclick="exportExcel()">Export Excel</button>
    </div>

    <!-- USER DASHBOARD -->
    <div id="userDash" class="page">
      <h2>Selamat Datang 👋</h2>
      <p id="tanggal"></p>

      <div class="card">💡 "Kerja keras hari ini menentukan masa depanmu"</div>
    </div>

    <!-- INPUT -->
    <div id="input" class="page">
      <h3>Input Lembur</h3>
      <input placeholder="Jam">
      <button>Simpan</button>
    </div>

    <!-- AKUN -->
    <div id="akun" class="page">
      <h3>Akun Saya</h3>
      <p id="nama"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
